suite: Service Tests
templates:
  - service.yaml
tests:
  # Basic Service Tests
  - it: should create service with default values
    asserts:
      - isKind:
          of: Service
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME
        documentIndex: 0
      - equal:
          path: spec.type
          value: ClusterIP
        documentIndex: 0
      - equal:
          path: spec.ports[0].port
          value: 80
        documentIndex: 0
      - equal:
          path: spec.ports[0].targetPort
          value: http
        documentIndex: 0

  - it: should configure custom service type and port
    set:
      service:
        type: NodePort
        port: 8080
    asserts:
      - equal:
          path: spec.type
          value: NodePort
        documentIndex: 0
      - equal:
          path: spec.ports[0].port
          value: 8080
        documentIndex: 0
      - equal:
          path: spec.ports[0].targetPort
          value: http
        documentIndex: 0
      - equal:
          path: spec.ports[0].name
          value: http
        documentIndex: 0

  # Headless Service Tests
  - it: should not create headless service by default
    asserts:
      - hasDocuments:
          count: 1

  - it: should create headless service when enabled
    set:
      service:
        headless:
          enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Service
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-headless
        documentIndex: 1
      - equal:
          path: spec.clusterIP
          value: None
        documentIndex: 1

  - it: should use containerPort for headless service by default
    set:
      containerPort: 9090
      service:
        headless:
          enabled: true
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
        documentIndex: 1

  - it: should use custom port for headless service when specified
    set:
      service:
        headless:
          enabled: true
          port: 5432
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 5432
        documentIndex: 1
