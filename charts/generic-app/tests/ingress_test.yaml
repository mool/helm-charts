suite: Ingress Tests
templates:
  - ingress.yaml
tests:
  # Basic Ingress Tests
  - it: should not create ingress when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ingress with basic configuration
    set:
      ingress:
        enabled: true
        className: "nginx"
        hosts:
          - host: example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: spec.rules[0].host
          value: "example.com"

  - it: should configure multiple hosts and paths
    set:
      ingress:
        enabled: true
        hosts:
          - host: app.example.com
            paths:
              - path: /api
                pathType: Prefix
              - path: /web
                pathType: Exact
          - host: api.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: "app.example.com"
      - equal:
          path: spec.rules[1].host
          value: "api.example.com"
      - lengthEqual:
          path: spec.rules[0].http.paths
          count: 2

  - it: should configure TLS properly
    set:
      ingress:
        enabled: true
        hosts:
          - host: secure.example.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: secure-tls
            hosts:
              - secure.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: secure-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: "secure.example.com"