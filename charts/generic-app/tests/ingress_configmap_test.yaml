suite: test ingress and configmap
templates:
  - ingress.yaml
  - configmap.yaml
tests:
  # Ingress Tests
  - it: should not create ingress by default
    template: ingress.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ingress when enabled
    template: ingress.yaml
    set:
      ingress:
        enabled: true
        hosts:
          - host: example.com
            paths:
              - path: "/"
                pathType: Prefix
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.rules[0].host
          value: example.com

  - it: should set ingress class name
    template: ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.hosts[0].host: example.com
      ingress.hosts[0].paths[0].path: /
      ingress.hosts[0].paths[0].pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should configure TLS
    template: ingress.yaml
    set:
      ingress.enabled: true
      ingress.hosts[0].host: example.com
      ingress.hosts[0].paths[0].path: /
      ingress.hosts[0].paths[0].pathType: Prefix
      ingress.tls[0].hosts[0]: example.com
      ingress.tls[0].secretName: example-tls
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: example.com
      - equal:
          path: spec.tls[0].secretName
          value: example-tls

  # ConfigMap Tests
  - it: should not create configmap by default
    template: configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create configmap when enabled
    template: configmap.yaml
    set:
      configMap.enabled: true
      configMap.data.APP_ENV: production
      configMap.data.DEBUG: "false"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: data.APP_ENV
          value: production
      - equal:
          path: data.DEBUG
          value: "false"