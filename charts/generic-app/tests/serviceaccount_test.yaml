suite: ServiceAccount Tests
templates:
  - serviceaccount.yaml
tests:
  # Basic ServiceAccount Tests
  - it: should create serviceaccount with default values
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not create serviceaccount when disabled
    set:
      serviceAccount:
        create: false
        name: "custom-sa"
    asserts:
      - hasDocuments:
          count: 0
