suite: ConfigMap Tests
templates:
  - configmap.yaml
tests:
  # Basic ConfigMap Tests
  - it: should not create configmap when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should create configmap with data when enabled
    set:
      configMap:
        enabled: true
        data:
          config.yaml: |
            key: value
            setting: enabled
          app.properties: |
            debug=true
            port=8080
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - exists:
          path: data["config.yaml"]
      - exists:
          path: data["app.properties"]