suite: test core resources (deployment, service, serviceaccount)
templates:
  - deployment.yaml
  - service.yaml
  - serviceaccount.yaml
tests:
  # Deployment Tests
  - it: should create deployment with default values
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.replicas
          value: 1

  - it: should set correct image
    template: deployment.yaml
    set:
      image.repository: nginx
      image.tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:latest

  - it: should apply security context
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  # Service Tests
  - it: should create service with default values
    template: service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80

  - it: should set custom service type
    template: service.yaml
    set:
      service.type: NodePort
      service.port: 3000
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 3000

  # ServiceAccount Tests
  - it: should create serviceaccount when enabled
    template: serviceaccount.yaml
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should disable token automount by default
    template: serviceaccount.yaml
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false