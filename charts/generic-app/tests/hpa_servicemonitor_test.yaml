suite: test autoscaling and monitoring
templates:
  - hpa.yaml
  - servicemonitor.yaml
tests:
  # HPA Tests
  - it: should not create hpa by default
    template: hpa.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create hpa when enabled
    template: hpa.yaml
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 10
      autoscaling.targetCPUUtilizationPercentage: 80
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should configure cpu metrics
    template: hpa.yaml
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 1
      autoscaling.maxReplicas: 5
      autoscaling.targetCPUUtilizationPercentage: 70
    asserts:
      - equal:
          path: spec.metrics[0].type
          value: Resource
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70

  # ServiceMonitor Tests
  - it: should not create servicemonitor by default
    template: servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create servicemonitor when enabled
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should configure endpoint settings
    template: servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.path: "/metrics"
      serviceMonitor.interval: "30s"
      serviceMonitor.scrapeTimeout: "10s"
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: "/metrics"
      - equal:
          path: spec.endpoints[0].interval
          value: "30s"
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: "10s"