# Minimal homelab application (like a simple API or microservice)
# Basic configuration with security hardening enabled

image:
  repository: nginx
  tag: "1.25-alpine"

nameOverride: "api-service"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Minimal security (uses defaults from values.yaml)
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Single replica for homelab
replicaCount: 1