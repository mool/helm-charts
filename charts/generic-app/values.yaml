# Default values for generic-app.

# App name.
appName: ""
# App version.
appVersion: ""

# This will set the replicaset count more information can be found here:
# https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# Workload type: "Deployment" or "StatefulSet"
# For more information see:
# - Deployments: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
# - StatefulSets: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/
workloadType: Deployment

# StatefulSet-specific configuration (only used when workloadType is "StatefulSet")
statefulSet:
  # Pod management policy: OrderedReady or Parallel
  # OrderedReady: Pods are created/terminated in order (default StatefulSet behavior)
  # Parallel: Pods are created/terminated in parallel
  podManagementPolicy: OrderedReady
  # Service name for the StatefulSet (defaults to headless service name or app name)
  # This must match a headless service for proper DNS resolution
  serviceName: ""
  # Update strategy for StatefulSet
  updateStrategy:
    type: RollingUpdate
    # rollingUpdate:
    #   partition: 0
  # Volume claim templates for persistent storage
  # Each pod in the StatefulSet will get its own PVC
  volumeClaimTemplates: []
  # Example:
  # volumeClaimTemplates:
  #   - metadata:
  #       name: data
  #     spec:
  #       accessModes: ["ReadWriteOnce"]
  #       storageClassName: "standard"
  #       resources:
  #         requests:
  #           storage: 1Gi

# This sets the container image more information can be found here:
# https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more
# information can be found here:
# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This section builds out the service account more information can be found
# here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  # Run as non-root group
  runAsGroup: 10001
  runAsUser: 10001
  runAsNonRoot: true
  # Set file permissions
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  # Use seccomp
  seccompProfile:
    type: RuntimeDefault

securityContext:
  # Drop all capabilities by default
  capabilities:
    drop:
      - ALL
  # Run as non-root user
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  # Read-only root filesystem
  readOnlyRootFilesystem: true
  # Prevent privilege escalation
  allowPrivilegeEscalation: false
  # Use seccomp
  seccompProfile:
    type: RuntimeDefault

# This is for setting up a service more information can be found here:
# https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here:
  # https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here:
  # https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80
  # Headless service configuration (commonly used with StatefulSets)
  # Creates an additional headless service (clusterIP: None) for stable network identity
  headless:
    enabled: false
    # Port for the headless service (defaults to containerPort if not set)
    port: ""

# Container port configuration
containerPort: 8080

# This block is for setting up the ingress for more information can be found
# here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 100m
    memory: 128Mi
    # Prevent excessive storage usage
    ephemeral-storage: 1Gi
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 1Gi

# This is to setup the liveness and readiness probes more information can be found here:
# https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe: {}
  # httpGet:
  #   path: /
  #   port: http
  # initialDelaySeconds: 30
  # periodSeconds: 10
  # timeoutSeconds: 5
  # failureThreshold: 30
readinessProbe: {}
  # httpGet:
  #   path: /
  #   port: http
startupProbe: {}
  # httpGet:
  #   path: /
  #   port: http

# This section is for setting up autoscaling more information can be found
# here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# ConfigMap configuration - creates a ConfigMap with specified data
configMap:
  enabled: false
  # Data to include in the ConfigMap
  data: {}
  # Example:
  # data:
  #   config.yaml: |
  #     server:
  #       port: 8080
  #   app.properties: |
  #     debug=true
  # Mount path for the ConfigMap (optional - if specified, will auto-mount)
  mountPath: ""
  # Volume name for the ConfigMap mount
  volumeName: "config"

# ServiceMonitor configuration for Prometheus monitoring
serviceMonitor:
  # Enable ServiceMonitor creation
  enabled: false
  # Additional labels for ServiceMonitor
  labels: {}
  # Additional annotations for ServiceMonitor
  annotations: {}
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s
  # Metrics path (defaults to /metrics)
  path: /metrics
  # Port name to scrape (defaults to http)
  portName: http
  # Additional endpoint configuration
  endpoints: []
  # Example for multiple endpoints:
  # endpoints:
  #   - port: http
  #     path: /metrics
  #     interval: 30s
  #   - port: admin
  #     path: /admin/metrics
  #     interval: 60s

# Network Policy configuration for enhanced security
networkPolicy:
  # Enable NetworkPolicy creation
  enabled: false
  # Policy types to enforce
  policyTypes:
    - Ingress
    - Egress
  # Ingress rules
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-controller
      ports:
        - protocol: TCP
          port: 8080
  # Egress rules
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow external HTTPS
    - to: []
      ports:
        - protocol: TCP
          port: 443

# Pod Disruption Budget for high availability
podDisruptionBudget:
  # Enable PodDisruptionBudget creation
  enabled: false
  # Minimum number of pods that must remain available
  minAvailable: 1
  # Alternative: maximum number of pods that can be unavailable
  # maxUnavailable: 1
