# Chart Testing Configuration
chart-dirs: [charts]

# Git configuration for change detection
remote: origin
target-branch: master
since: HEAD

# Validation settings (enable comprehensive validations)
check-version-increment: true
validate-maintainers: false
validate-chart-schema: true
validate-yaml: true

# Configuration file locations
lint-conf: .ct/lintconf.yaml
chart-yaml-schema: .ct/chart_schema.yaml

# Helm configuration
skip-helm-dependencies: false
helm-extra-args: ""
helm-lint-extra-args: "--quiet"
helm-dependency-extra-args: []

# Integration with existing helm unittest
additional-commands:
  - "helm unittest -f tests/*.yaml {{ .Path }}"

# Chart filtering
exclude-deprecated: true
excluded-charts: []

# GitHub Actions integration
github-groups: true
debug: false
